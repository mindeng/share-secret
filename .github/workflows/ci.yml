name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - "k8s/overlays/**/kustomization.yaml" # avoid reacting to the bot's own bump commit
  pull_request:
  workflow_dispatch:

# Per-ref. Don't cancel an in-flight main run (it may be mid-publish); do cancel
# superseded PR runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    # Postgres for the gated integration tests. The default suite ignores it
    # (those tests self-skip unless TEST_DATABASE_URL is set).
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Runs lib unit tests + every integration binary. postgres_test self-skips
      # here because TEST_DATABASE_URL is unset, so this proves the SQLite path.
      - name: Test (in-memory SQLite, default)
        run: cargo test --locked

      # Re-run the Postgres binary, this time pointed at the service container so
      # the tests actually execute against Postgres instead of skipping.
      - name: Test (PostgreSQL integration)
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: cargo test --locked --test postgres_test -- --nocapture

  build-and-publish:
    # Gate: only publish after tests pass, and never on pull requests.
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the kustomize image-tag bump back to main
      packages: write # push the image to ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: img
        env:
          REPO: ${{ github.repository }}
        run: echo "name=${REGISTRY}/${REPO,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bump image tag in kustomize overlay
        env:
          IMAGE: ${{ steps.img.outputs.name }}
          # Pin kustomize instead of piping the upstream install_kustomize.sh,
          # which queries the GitHub API for the latest release and fails
          # intermittently (rate limits / missing tarball -> tar error).
          KUSTOMIZE_VERSION: "5.8.1"
        run: |
          curl -sSfL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" | tar -xz
          SHA_TAG="sha-$(git rev-parse --short HEAD)"
          cd k8s/overlays/production
          ../../../kustomize edit set image "share-secret=${IMAGE}:${SHA_TAG}"

      - name: Commit and push the bump
        env:
          IMAGE: ${{ steps.img.outputs.name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- k8s/overlays/production/kustomization.yaml; then
            echo "No image change to commit."
            exit 0
          fi
          SHA_TAG="sha-$(git rev-parse --short HEAD)"
          git add k8s/overlays/production/kustomization.yaml
          git commit -m "ci: deploy ${IMAGE}:${SHA_TAG} [skip ci]"
          git push
