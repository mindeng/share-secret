name: build-and-publish

on:
  push:
    branches: [main]
    paths-ignore:
      - "k8s/overlays/**/kustomization.yaml" # avoid reacting to the bot's own bump commit
  workflow_dispatch:

# Serialize so two pushes can't race on the image-tag bump commit.
concurrency:
  group: build-and-publish
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the kustomize image-tag bump back to main
      packages: write # push the image to ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: img
        env:
          REPO: ${{ github.repository }}
        run: echo "name=${REGISTRY}/${REPO,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bump image tag in kustomize overlay
        env:
          IMAGE: ${{ steps.img.outputs.name }}
        run: |
          curl -sSfL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          SHA_TAG="sha-$(git rev-parse --short HEAD)"
          cd k8s/overlays/production
          ../../../kustomize edit set image "share-secret=${IMAGE}:${SHA_TAG}"

      - name: Commit and push the bump
        env:
          IMAGE: ${{ steps.img.outputs.name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- k8s/overlays/production/kustomization.yaml; then
            echo "No image change to commit."
            exit 0
          fi
          SHA_TAG="sha-$(git rev-parse --short HEAD)"
          git add k8s/overlays/production/kustomization.yaml
          git commit -m "ci: deploy ${IMAGE}:${SHA_TAG} [skip ci]"
          git push
