apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: share-secret
  labels:
    app: share-secret
spec:
  parentRefs:
    - name: share-secret
  # Set your real hostname, or remove hostnames to match any host.
  hostnames:
    - share-secret.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: share-secret
          port: 80
