apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: share-secret
  labels:
    app: share-secret
spec:
  parentRefs:
    - name: share-secret
  # Injected at apply time via envsubst from the APP_DOMAIN env var.
  # See k8s/README.md → Deploy.
  hostnames:
    - ${APP_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: share-secret
          port: 80
